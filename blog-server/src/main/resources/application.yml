server:
  port: 8088
  servlet:
    context-path: /

spring:
  application:
    name: blog-server

  # MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/personal%20blog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD:123456}  # IMPORTANT: Override via env var in production!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  # Mail (configure with your SMTP provider)
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # File Upload
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# Flyway Database Migration (auto-apply V*.sql on startup)
# baseline-version=18: V2-V18 already applied manually, only run V19+
spring.flyway:
  enabled: true
  locations: classpath:db
  baseline-on-migrate: true
  baseline-version: 18
  validate-on-migrate: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.blog.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-at-least-256-bits-for-hs256-algorithm-change-me}  # IMPORTANT: Set a strong secret via env var!
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# File Upload Path
upload:
  path: C:/Users/YCK/Desktop/Personal blog/blog-server/uploads
  url-prefix: /files
  allowed-types: jpg,jpeg,png,gif,webp,svg,mp4,webm,pdf,md

# Logging
logging:
  level:
    com.blog.server: DEBUG
    com.baomidou.mybatisplus: DEBUG

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# App settings
app:
  site-url: http://127.0.0.1:5173

# AI Service (OpenAI-compatible)
ai:
  api-url: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  max-input-length: 8000

# I4: Actuator health & info
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# I1: Server-side compression
server.compression:
  enabled: true
  mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
  min-response-size: 1024

