server {
    listen 80;
    server_name _;

    # Gzip compression (I1: resource compression)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    # Security headers (I3)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://plausible.io;" always;

    # Frontend (blog-web)
    location / {
        root /usr/share/nginx/html/web;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (I1)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Admin frontend (blog-admin)
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API proxy to blog-server
    location /api/ {
        proxy_pass http://blog-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Actuator (health check only)
    location /actuator/health {
        proxy_pass http://blog-server:8080;
        proxy_set_header Host $host;
    }

    # SEO files
    location = /sitemap.xml {
        proxy_pass http://blog-server:8080;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
    }

    location = /robots.txt {
        proxy_pass http://blog-server:8080;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
    }

    # File uploads
    location /files/ {
        proxy_pass http://blog-server:8080;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Upload size limit (I3)
    client_max_body_size 20m;
}
